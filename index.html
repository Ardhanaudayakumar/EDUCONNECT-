<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            color: white;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
        }

        .nav-links a {
            color: white;
            margin-left: 25px;
            text-decoration: none;
            font-weight: 400;
            transition: 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero-content {
            max-width: 600px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn-main {
            background: white;
            color: #764ba2;
            padding: 14px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Optional feature cards */
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            width: 180px;
            backdrop-filter: blur(10px);
        }

        .card h3 {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">EduConnect</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="login.html">Login</a>
    </div>
</div>

<!-- Hero Section -->
<section class="hero">
    <div class="hero-content">
        <h1>Welcome to EduConnect</h1>
        <p>Connecting Students and Teachers Seamlessly</p>

        <a href="login.html" class="btn-main">Get Started</a>

        <!-- Feature Cards -->
        <div class="features">
            <div class="card">
                <h3>📚 Learn</h3>
                <p>Access quality education</p>
            </div>

            <div class="card">
                <h3>👨‍🏫 Teach</h3>
                <p>Share your knowledge</p>
            </div>

            <div class="card">
                <h3>🌍 Connect</h3>
                <p>Find nearby teachers</p>
            </div>
        </div>
    </div>
</section>

</body>
</html>
