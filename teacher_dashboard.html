<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex">

  <!-- Sidebar -->
  <div class="w-64 bg-white rounded-2xl shadow p-6 m-4">
    <h2 class="text-lg font-semibold mb-6 text-gray-600">
      EduConnect Portal
    </h2>

    <div class="space-y-4">
      <div class="flex items-center gap-3 p-3 rounded-xl text-gray-600">
        🏠 Dashboard
      </div>
      <div class="flex items-center gap-3 p-3 rounded-xl bg-blue-100 text-blue-600">
        📘 Courses
      </div>
      <div class="flex items-center gap-3 p-3 rounded-xl text-gray-600">
        💬 Messages
      </div>
      <div class="flex items-center gap-3 p-3 rounded-xl text-gray-600">
        🚪 Logout
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-slate-700">
        Teacher Dashboard
      </h1>

      <div class="w-12 h-12 rounded-full bg-blue-200 flex items-center justify-center text-xl">
        👨‍🏫
      </div>
    </div>

    <div class="grid grid-cols-3 gap-6">

      <!-- Left Section -->
      <div class="col-span-2 space-y-6">

        <!-- Date Card -->
        <div class="bg-white p-5 rounded-2xl shadow flex justify-between items-center">
          <div class="flex items-center gap-4">
            <div class="bg-blue-100 p-3 rounded-xl">📅</div>
            <p class="text-lg font-semibold text-gray-700">
              Tue, April 23
            </p>
          </div>
          <span class="text-gray-400 text-xl">›</span>
        </div>

        <!-- Quick Actions -->
        <div>
          <h2 class="text-lg font-semibold mb-4 text-gray-600">
            Quick Actions
          </h2>

          <div class="space-y-4">

            <div onclick="goToUpdateLocation()" 
     class="bg-white p-5 rounded-2xl shadow flex items-center gap-4 cursor-pointer">
  <div class="bg-blue-100 p-3 rounded-xl">📍</div>
  <span class="text-blue-600 underline">
    Update Location
  </span>
</div>

            <div class="bg-white p-5 rounded-2xl shadow flex items-center gap-4">
              <div class="bg-blue-100 p-3 rounded-xl">💬</div>
              <span class="text-blue-600 underline cursor-pointer">
                Student Doubts
              </span>
            </div>

            <!-- ✅ CLICKABLE TEACHER UPDATE CARD -->
            <div onclick="goToTeacherUpdate()" 
                 class="bg-white p-5 rounded-2xl shadow flex items-center gap-4 cursor-pointer">
              <div class="bg-blue-100 p-3 rounded-xl">📝</div>
              <span class="text-blue-600 underline">
                Teacher Update
              </span>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow flex items-center gap-4">
              <div class="bg-blue-100 p-3 rounded-xl">⭐</div>
              <span class="text-blue-600 underline cursor-pointer">
                View Feedback
              </span>
            </div>

            

          </div>
        </div>
      </div>

      <!-- Right Section -->
      <div class="space-y-6">

        <!-- Pending Doubts -->
        <div class="bg-white p-5 rounded-2xl shadow flex justify-between items-center">
          <div>
            <p class="text-gray-500">Pending Doubts</p>
            <p class="text-3xl font-bold text-gray-700">5</p>
            <div class="h-2 w-24 bg-blue-200 rounded-full mt-2"></div>
          </div>
          <div class="bg-yellow-100 p-3 rounded-xl">❓</div>
        </div>

        <!-- Feedback -->
        <div class="bg-white p-5 rounded-2xl shadow flex justify-between items-center">
          <div>
            <p class="text-gray-500">Recent Feedback</p>
            <p class="text-3xl font-bold text-gray-700">12</p>
            <div class="h-2 w-24 bg-blue-200 rounded-full mt-2"></div>
          </div>
          <div class="bg-purple-100 p-3 rounded-xl">⭐</div>
        </div>

        <!-- Feedback Preview -->
        <div class="bg-white p-4 rounded-2xl shadow flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-gray-300"></div>
          <div>
            <p class="font-semibold text-gray-700">Sarah</p>
            <p class="text-sm text-gray-500">
              Great teaching, very helpful!
            </p>
          </div>
        </div>

        <!-- Map Placeholder -->
        <div class="bg-white rounded-2xl shadow h-40 flex items-center justify-center text-gray-400">
          Map Preview
        </div>

      </div>
    </div>
  </div>

  <!-- ✅ SCRIPT -->
 <script>
function goToTeacherUpdate() {
  window.location.href = "teachers_location.html";
}

function goToUpdateLocation() {
  window.location.href = "update_teacher.html";
}
</script>

</body>
</html>
